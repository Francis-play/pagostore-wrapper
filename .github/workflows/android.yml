name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    steps:
      # ---------- CHECKOUT ----------
      - uses: actions/checkout@v4

      # ---------- PNPM ----------
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # ---------- NODE ----------
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: 'pnpm'

      # ---------- CACHE NODE_MODULES ----------
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ---------- INSTALL JS ----------
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      # ---------- JAVA ----------
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------- CACHE GRADLE ----------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- CACHE CMAKE / NDK (CRÍTICO) ----------
      - name: Cache Android CXX
        uses: actions/cache@v4
        with:
          path: |
            android/.cxx
            android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      # ---------- PREINSTALL NDK + CMAKE ----------
      - name: Install NDK & CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"

      # ---------- GRADLE PERMISSION ----------
      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      # ---------- BUILD (SIN CLEAN NI RERUN) ----------
      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew clean
          ./gradlew assembleRelease --build-cache

      # ---------- ARTIFACT ----------
      - uses: actions/upload-artifact@v4
        with:
          name: app-release

          path: android/app/build/outputs/apk/release/*.apk




